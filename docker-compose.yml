version: '3.8'

services:
  bot:
    build: .
    container_name: quant_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - trading-engine
    command: python -m api.telegram.main

  trading-engine:
    build: .
    container_name: quant_trading_engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    command: uvicorn api.rest.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:15-alpine
    container_name: quant_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_password}
      POSTGRES_DB: ${POSTGRES_DB:-quant_db}
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quant_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
